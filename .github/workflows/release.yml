name: Build and Package Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  PROJECT_NAME: OutSystems.Extension.MathNetNumerics
  PRODUCT_NAME: MathNetNumerics

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup .NET 8
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.sln

    - name: Run tests
      run: >
        dotnet test
        ${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.sln
        --configuration Release
        --verbosity normal

    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Publish application
      run: >
        dotnet publish
        ${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.csproj
        --configuration Release
        --runtime linux-x64
        --self-contained false
        --output ./publish

    - name: Create deployment zip
      run: |
        cd publish
        zip -r ../${{ env.PRODUCT_NAME }}_v${{ steps.version.outputs.VERSION }}.zip .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
      with:
        generate_release_notes: true
        files: ${{ env.PRODUCT_NAME }}_v${{ steps.version.outputs.VERSION }}.zip
